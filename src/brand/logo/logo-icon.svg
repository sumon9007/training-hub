<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Training Hub icon">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <!-- Subtle inner glow -->
    <radialGradient id="glow" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="200" height="200" rx="44" fill="url(#bg-grad)"/>
  <rect width="200" height="200" rx="44" fill="url(#glow)"/>

  <!-- TH monogram — white geometric mark -->
  <!-- T crossbar (full width) -->
  <rect x="28" y="40" width="144" height="28" rx="14" fill="white"/>
  <!-- T stem / H left post — full height, rounded bottom -->
  <rect x="86" y="40" width="28" height="130" rx="14" fill="white"/>
  <!-- H right post -->
  <rect x="144" y="40" width="28" height="130" rx="14" fill="white"/>
  <!-- H crossbar — connects the two vertical posts -->
  <rect x="86" y="88" width="86" height="24" fill="white"/>
</svg>
