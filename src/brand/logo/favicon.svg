<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="BD Cloud Academy favicon">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#g)"/>

  <!-- Graduation cap — simplified for 32px -->
  <polygon points="16,3 25.5,7.5 16,12 6.5,7.5" fill="white"/>
  <line x1="25.5" y1="7.5" x2="25.5" y2="12" stroke="#fbbf24" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Cloud — bold blob -->
  <circle cx="10.5" cy="21.5" r="5" fill="white"/>
  <circle cx="16" cy="19" r="6.5" fill="white"/>
  <circle cx="22" cy="22" r="4.5" fill="white"/>
  <rect x="6.5" y="21" width="20" height="6" rx="3" fill="white"/>
