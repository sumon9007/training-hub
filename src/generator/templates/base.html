<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{COURSE_TITLE}} — BD Cloud Academy</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/black.css" />
  <link rel="stylesheet" href="../../src/theme/training.css" />
  <style>
    /* Inline path override when served standalone */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  </style>
</head>
<body>

<div class="reveal">
  <div class="slides">

    {{SLIDES_CONTENT}}

  </div>
</div>

<!-- [R1-A] Slide-type badge -->
<div id="slide-type-badge"></div>

<!-- [R1-B] Module progress HUD (top-center) -->
<div id="module-hud">
  <span id="hud-module-num"></span>
  <span class="hud-dot">·</span>
  <span id="hud-module-name"></span>
  <span class="hud-dot">·</span>
  <span id="hud-slide"></span>
  <div id="hud-bar-track"><div id="hud-bar-fill"></div></div>
</div>

<!-- [R1-Nav] Global progress chip (top-right) -->
<div id="global-progress">
  <span id="gp-label"></span>
  <span id="gp-pct"></span>
  <div id="gp-bar-track"><div id="gp-bar-fill"></div></div>
</div>

<!-- [R1-Nav] Bottom module navigation bar -->
<div id="bottom-nav">
  <button class="bnav-arrow" id="bnav-prev" aria-label="Previous slide">&#8592;</button>
  <div class="bnav-modules" id="bnav-modules"></div>
  <button class="bnav-arrow" id="bnav-next" aria-label="Next slide">&#8594;</button>
</div>

<!-- Back to hub + user chip — sits above bottom nav bar -->
<div style="position:fixed;bottom:54px;left:16px;z-index:999;display:flex;align-items:center;gap:8px;font-family:Inter,sans-serif;font-size:11px">
  <a href="../../index.html" style="color:#475569;text-decoration:none;background:rgba(15,23,42,0.9);border:1px solid #1E293B;padding:5px 10px;border-radius:6px;transition:color 0.2s" onmouseover="this.style.color='#94A3B8'" onmouseout="this.style.color='#475569'">← Hub</a>
  <span id="pres-user" style="display:none;color:#64748b;background:rgba(15,23,42,0.9);border:1px solid #1E293B;padding:5px 10px;border-radius:6px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
  <a href="/.auth/logout?post_logout_redirect_uri=/login.html" id="pres-logout" style="display:none;color:#f87171;text-decoration:none;background:rgba(15,23,42,0.9);border:1px solid #1E293B;padding:5px 10px;border-radius:6px">Sign out</a>
  <a href="/login.html" id="pres-login" style="display:none;color:#60a5fa;text-decoration:none;background:rgba(15,23,42,0.9);border:1px solid #1E293B;padding:5px 10px;border-radius:6px">Sign in</a>
</div>
<script>
  fetch('/.auth/me').then(r=>r.json()).then(d=>{
    const p=d.clientPrincipal;
    if(p){
      const el=document.getElementById('pres-user');el.textContent=p.userDetails;el.style.display='block';
      document.getElementById('pres-logout').style.display='block';
    } else{document.getElementById('pres-login').style.display='block';}
  }).catch(()=>{});
</script>

<!-- Reveal.js -->
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/zoom/zoom.js"></script>

<!-- Mermaid -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

<script>
  // Init Mermaid before Reveal so diagrams render
  mermaid.initialize({
    startOnLoad: false,
    theme: 'dark',
    themeVariables: {
      darkMode: true,
      background: '#080E1C',
      primaryColor: '#0078D4',
      primaryTextColor: '#E2E8F0',
      primaryBorderColor: '#1E293B',
      lineColor: '#475569',
      secondaryColor: '#0F172A',
      tertiaryColor: '#1E293B',
      fontSize: '14px',
    },
    flowchart: { curve: 'basis', htmlLabels: true },
    sequence: { mirrorActors: false },
  });

  Reveal.initialize({
    hash: true,
    slideNumber: false,
    progress: false,
    controls: false,
    transition: 'slide',
    transitionSpeed: 'default',
    backgroundTransition: 'fade',
    center: false,
    width: 1280,
    height: 720,
    margin: 0.04,
    minScale: 0.2,
    maxScale: 2.0,
    plugins: [ RevealNotes, RevealHighlight, RevealZoom ],
    // PDF print layout
    pdfMaxPagesPerSlide: 1,
    pdfSeparateFragments: false,
  });

  // Render ALL Mermaid diagrams at once after Reveal is ready
  Reveal.on('ready', renderAllMermaid);

  function renderAllMermaid() {
    document.querySelectorAll('.mermaid:not([data-rendered])').forEach(el => {
      el.setAttribute('data-rendered', 'true');
      const code = el.textContent.trim();
      el.innerHTML = '';
      mermaid.render('mermaid-' + Math.random().toString(36).slice(2), code)
        .then(({ svg }) => {
          el.innerHTML = svg;
          const svgEl = el.querySelector('svg');
          if (svgEl) {
            svgEl.removeAttribute('style');
            svgEl.setAttribute('width', '100%');
            svgEl.removeAttribute('height');
          }
        })
        .catch(err => {
          el.textContent = '';
          el.style.color = '#EF4444';
          el.style.fontSize = '0.7em';
          el.textContent = '⚠ Diagram error: ' + err.message;
        });
    });
  }

  // Quiz interaction
  document.addEventListener('click', e => {
    const option = e.target.closest('.quiz-option');
    if (!option) return;
    const container = option.closest('.quiz-container');
    if (!container || container.dataset.answered) return;
    container.dataset.answered = 'true';
    const isCorrect = option.dataset.correct === 'true';
    container.querySelectorAll('.quiz-option').forEach(o => {
      o.classList.add(o.dataset.correct === 'true' ? 'correct' : 'incorrect');
    });
    const exp = container.querySelector('.quiz-explanation');
    if (exp) exp.classList.add('show');
  });

  // Copy-to-clipboard buttons on every code block
  Reveal.on('ready', () => {
    document.querySelectorAll('.reveal pre').forEach(pre => {
      const code = pre.querySelector('code');
      if (!code || pre.querySelector('.code-copy-btn')) return;
      const btn = document.createElement('button');
      btn.className = 'code-copy-btn';
      btn.type = 'button';
      btn.textContent = 'Copy';
      btn.addEventListener('click', ev => {
        ev.stopPropagation();
        const text = code.innerText;
        const done = () => {
          btn.textContent = 'Copied ✓';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(done);
        } else {
          const ta = document.createElement('textarea');
          ta.value = text;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          ta.remove();
          done();
        }
      });
      pre.appendChild(btn);
    });
  });

  // ── Module exam simulator (timed, scored) ─────────────────────────────────
  // Markup contract (built by the generator):
  //   .exam-intro    [data-exam-id]            with .exam-start [data-minutes]
  //   .exam-question [data-exam-id][data-q]    with .exam-option [data-correct][data-rationale]
  //   .exam-results  [data-exam-id][data-total][data-pass]  with .exam-score / .exam-review / .exam-retake
  // All handlers are no-ops when a deck contains no exam markup.
  const exams = {};

  function examTimerBadge() {
    let badge = document.querySelector('.exam-timer');
    if (!badge) {
      badge = document.createElement('div');
      badge.className = 'exam-timer';
      document.body.appendChild(badge);
    }
    return badge;
  }

  function startExam(examId, minutes) {
    const exam = exams[examId] = {
      answers: {},
      deadline: Date.now() + minutes * 60000,
      finished: false,
      timerHandle: null,
    };
    const badge = examTimerBadge();
    badge.style.display = 'block';
    const tick = () => {
      const left = exam.deadline - Date.now();
      if (left <= 0) {
        badge.textContent = '0:00';
        jumpToResults(examId);
        return;
      }
      const m = Math.floor(left / 60000);
      const s = Math.floor((left % 60000) / 1000);
      badge.textContent = m + ':' + String(s).padStart(2, '0');
      badge.classList.toggle('warning', left < 60000);
    };
    tick();
    exam.timerHandle = setInterval(tick, 1000);
    Reveal.next();
  }

  function jumpToResults(examId) {
    const results = document.querySelector('.exam-results[data-exam-id="' + examId + '"]');
    if (!results) return;
    const idx = Reveal.getIndices(results);
    Reveal.slide(idx.h, idx.v);
    renderResults(examId);
  }

  function finishExam(examId) {
    const exam = exams[examId];
    if (!exam || exam.finished) return;
    exam.finished = true;
    if (exam.timerHandle) clearInterval(exam.timerHandle);
    const badge = document.querySelector('.exam-timer');
    if (badge) { badge.style.display = 'none'; badge.classList.remove('warning'); }
  }

  function renderResults(examId) {
    const results = document.querySelector('.exam-results[data-exam-id="' + examId + '"]');
    const exam = exams[examId];
    if (!results || !exam) return;
    finishExam(examId);

    const questions = Array.from(document.querySelectorAll('.exam-question[data-exam-id="' + examId + '"]'));
    const total = questions.length || parseInt(results.dataset.total || '0', 10);
    const pass = parseInt(results.dataset.pass || '70', 10);
    let correct = 0;
    const rows = [];
    questions.forEach(q => {
      const qNo = q.dataset.q;
      const options = Array.from(q.querySelectorAll('.exam-option'));
      const chosen = exam.answers[qNo];
      const correctOpt = options.find(o => o.dataset.correct === 'true');
      const chosenOpt = options[chosen];
      const ok = chosenOpt && chosenOpt.dataset.correct === 'true';
      if (ok) correct++;
      const qTitle = (q.querySelector('.exam-stem') || q.querySelector('p') || {}).textContent || ('Question ' + (parseInt(qNo, 10) + 1));
      rows.push(
        '<div class="exam-review-row ' + (ok ? 'right' : 'wrong') + '">' +
        '<span class="mark">' + (ok ? '✓' : '✗') + '</span>' +
        '<div class="detail">' +
        '<div class="q">' + 'Q' + (parseInt(qNo, 10) + 1) + ' · ' + qTitle.slice(0, 90) + (qTitle.length > 90 ? '…' : '') + '</div>' +
        '<div class="a">Your answer: ' + (chosenOpt ? chosenOpt.textContent.trim().slice(0, 80) : '— skipped') +
        (ok ? '' : ' · Correct: ' + (correctOpt ? correctOpt.textContent.trim().slice(0, 80) : '?')) + '</div>' +
        (correctOpt && correctOpt.dataset.rationale ? '<div class="r">' + correctOpt.dataset.rationale + '</div>' : '') +
        '</div></div>'
      );
    });
    const pct = total ? Math.round((correct / total) * 100) : 0;
    const passed = pct >= pass;
    const scoreEl = results.querySelector('.exam-score');
    if (scoreEl) {
      scoreEl.innerHTML =
        '<div class="pct ' + (passed ? 'pass' : 'fail') + '">' + pct + '%</div>' +
        '<div class="verdict">' + correct + ' / ' + total + ' correct — ' +
        (passed ? 'PASS 🎉' : 'Review needed (target ' + pass + '%)') + '</div>';
    }
    const reviewEl = results.querySelector('.exam-review');
    if (reviewEl) reviewEl.innerHTML = rows.join('');
    results.dataset.rendered = 'true';
  }

  document.addEventListener('click', e => {
    const start = e.target.closest('.exam-start');
    if (start) {
      const examId = start.dataset.examId;
      const minutes = parseFloat(start.dataset.minutes || '10');
      startExam(examId, minutes);
      return;
    }
    const retake = e.target.closest('.exam-retake');
    if (retake) {
      const examId = retake.dataset.examId;
      delete exams[examId];
      const results = document.querySelector('.exam-results[data-exam-id="' + examId + '"]');
      if (results) {
        delete results.dataset.rendered;
        const scoreEl = results.querySelector('.exam-score');
        const reviewEl = results.querySelector('.exam-review');
        if (scoreEl) scoreEl.innerHTML = '';
        if (reviewEl) reviewEl.innerHTML = '';
      }
      document.querySelectorAll('.exam-question[data-exam-id="' + examId + '"] .exam-option.selected')
        .forEach(o => o.classList.remove('selected'));
      const intro = document.querySelector('.exam-intro[data-exam-id="' + examId + '"]');
      if (intro) {
        const idx = Reveal.getIndices(intro);
        Reveal.slide(idx.h, idx.v);
      }
      return;
    }
    const option = e.target.closest('.exam-option');
    if (option) {
      const q = option.closest('.exam-question');
      const exam = exams[q && q.dataset.examId];
      if (!q || !exam || exam.finished) return;
      q.querySelectorAll('.exam-option').forEach(o => o.classList.remove('selected'));
      option.classList.add('selected');
      exam.answers[q.dataset.q] = Array.from(q.querySelectorAll('.exam-option')).indexOf(option);
    }
  });

  Reveal.on('slidechanged', e => {
    const slide = e.currentSlide;
    if (slide.classList && slide.classList.contains('exam-results') && !slide.dataset.rendered) {
      const examId = slide.dataset.examId;
      if (exams[examId]) renderResults(examId);
    }
    // Pause the timer display when navigating away from an unfinished exam? No —
    // real exams keep counting; the badge stays visible until finished or expired.
  });

  // ── ROUND 1-A: Slide-type badge ──────────────────────────────────────────
  const stBadge = document.getElementById('slide-type-badge');

  function getSlideType(slide) {
    if (!slide) return null;
    const cl = slide.classList;
    if (cl.contains('title-slide')) return null;
    if (cl.contains('exam-intro') || cl.contains('exam-results') ||
        cl.contains('exam-question') || cl.contains('exam-slide'))
      return { label: 'EXAM', cls: 'type-exam' };
    if (cl.contains('lab-slide'))
      return { label: 'LAB', cls: 'type-lab' };
    if (slide.querySelector('.quiz-container'))
      return { label: 'KNOWLEDGE CHECK', cls: 'type-check' };
    if (slide.querySelector('.diagram-container'))
      return { label: 'DIAGRAM', cls: 'type-diagram' };
    if (cl.contains('module-slide'))
      return { label: 'MODULE', cls: 'type-module' };
    return { label: 'LESSON', cls: 'type-lesson' };
  }

  function updateSlideBadge(slide) {
    const type = getSlideType(slide);
    stBadge.className = '';
    if (!type) { stBadge.style.display = 'none'; return; }
    stBadge.style.display = 'block';
    stBadge.className = type.cls;
    stBadge.textContent = type.label;
  }

  // ── ROUND 1-B: Module progress HUD ───────────────────────────────────────
  const moduleHud  = document.getElementById('module-hud');
  const hudNumEl   = document.getElementById('hud-module-num');
  const hudNameEl  = document.getElementById('hud-module-name');
  const hudSlideEl = document.getElementById('hud-slide');
  const hudBarFill = document.getElementById('hud-bar-fill');
  let moduleMap = [];

  function buildModuleMap() {
    moduleMap = [];
    let running = 0;
    document.querySelectorAll('.reveal .slides > section').forEach((outer, h) => {
      const inner = Array.from(outer.querySelectorAll(':scope > section'));
      const firstSlide = inner[0] || outer;
      const h1 = firstSlide.querySelector('h1');
      let name = h1 ? h1.textContent.trim() : ('Section ' + (h + 1));
      name = name.replace(/^module\s+\d+[\s:–-]*/i, '').trim();
      if (name.length > 32) name = name.slice(0, 32) + '…';
      const count = Math.max(inner.length, 1);
      moduleMap.push({ h, name, count, startGlobal: running });
      running += count;
    });
  }

  function updateHud(indices) {
    const { h, v } = indices;
    const m = moduleMap[h];
    const currentSlide = Reveal.getCurrentSlide();
    if (!m || moduleMap.length <= 1 || (currentSlide && currentSlide.classList.contains('title-slide'))) {
      moduleHud.style.display = 'none'; return;
    }
    const timer = document.querySelector('.exam-timer');
    if (timer && timer.style.display === 'block') { moduleHud.style.display = 'none'; return; }
    const slideNum = (v || 0) + 1;
    const total    = m.count;
    const pct      = total > 1 ? Math.round((slideNum / total) * 100) : 100;
    hudNumEl.textContent   = 'Module ' + (h + 1) + ' of ' + moduleMap.length;
    hudNameEl.textContent  = m.name;
    hudSlideEl.textContent = slideNum + ' / ' + total;
    hudBarFill.style.width = pct + '%';
    moduleHud.style.display = 'flex';
  }

  // ── ROUND 1-C: Exam-tip callout auto-classify ─────────────────────────────
  function classifyExamTips() {
    document.querySelectorAll('.reveal .callout').forEach(el => {
      if (el.classList.contains('warning') || el.classList.contains('success') ||
          el.classList.contains('exam-tip')) return;
      if (el.textContent.includes('🎯')) el.classList.add('exam-tip');
    });
  }

  // ── OPTION A: Bottom module navigation bar ────────────────────────────────
  function buildBottomNav() {
    const container = document.getElementById('bnav-modules');
    if (!container) return;
    container.innerHTML = '';
    moduleMap.forEach((m, i) => {
      const pill = document.createElement('div');
      pill.className = 'bnav-module';
      pill.dataset.title = 'Module ' + (i + 1) + ' — ' + m.name;
      pill.innerHTML = '<div class="bnav-module-fill"></div><div class="bnav-module-label">M' + (i + 1) + '</div>';
      pill.addEventListener('click', () => Reveal.slide(m.h, 0));
      container.appendChild(pill);
    });
    document.getElementById('bnav-prev').addEventListener('click', () => Reveal.prev());
    document.getElementById('bnav-next').addEventListener('click', () => Reveal.next());
  }

  function updateBottomNav(indices) {
    const { h, v } = indices;
    document.querySelectorAll('.bnav-module').forEach((pill, i) => {
      const m = moduleMap[i];
      if (!m) return;
      const fill = pill.querySelector('.bnav-module-fill');
      pill.classList.remove('active', 'completed');
      if (i < h) {
        pill.classList.add('completed');
        if (fill) fill.style.width = '100%';
      } else if (i === h) {
        pill.classList.add('active');
        const pct = m.count > 1 ? Math.round(((v || 0) + 1) / m.count * 100) : 100;
        if (fill) fill.style.width = pct + '%';
      } else {
        if (fill) fill.style.width = '0%';
      }
    });
    const prevBtn = document.getElementById('bnav-prev');
    const nextBtn = document.getElementById('bnav-next');
    if (prevBtn) prevBtn.disabled = Reveal.isFirstSlide();
    if (nextBtn) nextBtn.disabled = Reveal.isLastSlide();
  }

  // ── Global progress chip (top-right) ─────────────────────────────────────
  function updateGlobalProgress(indices) {
    const gpEl  = document.getElementById('global-progress');
    const gpPct = document.getElementById('gp-pct');
    const gpBar = document.getElementById('gp-bar-fill');
    const gpLbl = document.getElementById('gp-label');
    if (!gpEl) return;
    const timer = document.querySelector('.exam-timer');
    const currentSlide = Reveal.getCurrentSlide();
    const isTitle     = currentSlide && currentSlide.classList.contains('title-slide');
    const examRunning = timer && timer.style.display === 'block';
    if (isTitle || examRunning) { gpEl.style.display = 'none'; return; }
    const { h, v } = indices;
    const m = moduleMap[h];
    if (!m) return;
    const totalSlides   = moduleMap.reduce((s, mod) => s + mod.count, 0);
    const currentGlobal = m.startGlobal + (v || 0) + 1;
    const pct = Math.round((currentGlobal / totalSlides) * 100);
    if (gpLbl) gpLbl.textContent = document.title.split(/[—:]/)[0].trim();
    if (gpPct) gpPct.textContent = pct + '%';
    if (gpBar) gpBar.style.width = pct + '%';
    gpEl.style.display = 'flex';
  }

  // ── Wire everything up ────────────────────────────────────────────────────
  Reveal.on('ready', () => {
    buildModuleMap();
    buildBottomNav();
    classifyExamTips();
    const idx = Reveal.getIndices();
    updateSlideBadge(Reveal.getCurrentSlide());
    updateHud(idx);
    updateBottomNav(idx);
    updateGlobalProgress(idx);
  });

  Reveal.on('slidechanged', e => {
    const idx = Reveal.getIndices();
    updateSlideBadge(e.currentSlide);
    updateHud(idx);
    updateBottomNav(idx);
    updateGlobalProgress(idx);
  });
</script>

</body>
</html>
